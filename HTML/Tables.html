<!--
  # Tables:
    - Display data in rows and column format
    - Tags:
      - <table></table>: Wrapper tag for HTML Tables
      - <tr></tr>: Table row
      - <th></th>: Table header
      - <td></td>: Table data

    - Syntax:
      <table>
        <tr>
          <th>Table Header 1</th>
          <th>Table Header 2</th>
        </tr>
        <tr>
          <td>Table Data 1</td>
          <td>Table Data 2</td>
        </tr>
      </table>

    - Note:
      - No. of "th" in first tr = No. of "td" in all successive tr

    - Span (Cell Merge)
      - colspan: Column Span
        - Data is same across 'n' number of columns within a single row
      - rowspan: Row Span
        - Data is same across 'n' number of cells in different rows
-->
