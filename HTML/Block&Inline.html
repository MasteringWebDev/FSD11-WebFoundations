<html>
  <head>
    <title>Block and Inline tags</title>
  </head>
  <body>
    <h1>Block and Inline tags</h1>
    <hr>

    <!-- BLOCK ELEMENTS -->
    <h1>Gonzo</h1>
    <p>Kibbe</p>
    <ul>
      <li>Milk</li>
      <li>Eggs</li>
      <li>Coffee</li>
    </ul>

    <!-- INLINE ELEMENTS -->
    <span>
      <img src="images/mern-stack-2.png" width="200">
      <a href="https://www.w3schools.com">w3schools</a>
    </span>
  </body>
</html>

<!--
  # Block Elements
    - Tags which take the entire horizontal space
    - Eg.: h1-h6, p, ul, ol, li, div etc.

  # Inline Elements
    - Tags which only take space = their dimensions
    - Eg.: img, a, span, etc.

  # div and span:
    - Used to group code related to a part of the UI together
    - Difference:
      - div: Block Element
      - span: Inline Elements 
-->
