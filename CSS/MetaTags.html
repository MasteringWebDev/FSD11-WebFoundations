<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Connect with like minded people, share stories with each other">
  <meta name="keywords" content="social media app, find friends online, connect with friends">
  <meta name="author" content="Sonny Brown">
  <title>Facebook</title>
  <style>
    #box-1 {
      width: 400px;
      height: 300px;
      background-color: darkcyan;
    }
  </style>
</head>
<body>
  <h1>We are learning about Meta Tags</h1>
  <div id="box-1"></div>
</body>
</html>

<!--
  # Meta Tags:
    - Metadata: Data of data
    - Tag: <meta> (within head tag)
    - Attributes:
      - name (meta tag for what?)
        - description: Description of the webpage
        - keywords: Keywords related to the webpage
        - author: Author of the webpage
        - viewport: Set the viewport width and height based on the device width and height
      - content: Value for respective 'name' key
      - charset: Character set

-->
