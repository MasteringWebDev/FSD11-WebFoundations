<!--
  # Flexbox ***
    - Organize items in one direction (vertically/horizontally)
    - Properties:
      - Container
        - display ***: flex (Container follows flexbox layout)
        - flex-direction ***: Set the direction of flex container's item 
          - row (default)
          - column
        - justify-content ***: Align items across "main axis"
          - start: Start of the container (default)
          - end: End of the container
          - center: Center of the container
          - space-around: Equal space on both the sides (space in between will be 2* space)
          - space-evenly: Equal space on both the sides (space in between will be merged)
          - space-between: Space in between items
        - align-items ***: Align items across "cross axis"
          - start: Start of the container (default)
          - end: End of the container
          - center: Center of the container
        - flex-wrap: Wrap the child items if they exceed the flex container's dimensions
          - nowrap (default): No wrapping
          - wrap: Wrap child items to the next row

      - Individual Items
        - order: Set the order of indvidual item
          - Min, default: 0
          - Lesser order will be placed first, i.e, 0 before 1 and so on ...

      # Main axis & Cross axis:
        - flex-direction: row (default)
          - Main axis: Horizontal axis
          - Cross axis: Vertical axis
        - flex-direction: column (default)
          - Main axis: Vertical axis
          - Cross axis: Horizontal axis

      # Rule to remember:
        - Default (flex-direction: row):
          - Main axis: Horizontal axis
          - Cross axis: Veritical axis
        - Align items
          - Main axis: justify-content
          - Cross axis: align-items
-->
