<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Queries</title>
  <style>
    /* All devices */
    #test {
      background-color: azure;
      border: 1px solid black;
      padding: 10px;
      width: 600px;
      margin: auto;
    }

    #test-2 {
      background-color: darkcyan;
      width: 500px;
      height: 500px;
      margin: 10px auto;
    }

    #test-3 {
      background-color: red;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      margin: 10px auto;
    }

    /* Only for mobile devices */
    @media screen and (max-width: 575px) {
      #test {
        width: 90%;
        background-color: rgba(95, 158, 160, 0.5);
      }

      #test-2 {
        width: 300px;
        height: 300px;
        border-radius: 50%;
      }
    }

    /* Only for desktop devices */
    @media screen and (min-width: 992px) {
      #test-3 {
        background-color: green;
        width: 100%;
        height: 300px;
        margin: 10px auto;
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <div id="test">
    <h1>Lorem ipsum dolor sit</h1>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Quod asperiores sequi, dicta, vel deleniti placeat, a autem hic quis enim soluta? Culpa quaerat cum hic enim itaque, inventore laudantium rem!</p>
  </div>

  <div id="test-2"></div>

  <div id="test-3"></div>
</body>
</html>

<!--
  # Media Queries:
    - Style rules for different screen dimensions
    - Syntax:
      @media mediaType and (condition) {
        // style to be applied to those devices which match the above condition
      }
      - mediaType
        - screen ***: Screen
        - print: Print
        - all: All media types
      - condition
        - max-width***: Device width lesser than or equals to the given width
        - min-width***: Device width greater than or equals to the given width

    - Breakpoints:
      - Laptops/Desktops: >= 992px
      - Tablets: > 575px and < 992px
      - Mobile devices: <= 575px
-->
