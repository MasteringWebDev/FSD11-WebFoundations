<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="index.css">
</head>
<body class="bg-dark">
  <!-- -------------- NAVBAR -------------- -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
         <img src="assets/logo.png" alt="Logo" width="30" class="d-inline-block align-text-top">
        YouTube
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        </ul>
        <form class="input-group me-auto" role="search" style="width: 400px;">
          <input class="form-control" type="search" placeholder="Search" id="search-input">
          <button class="btn btn-dark border" type="button" onclick="searchYTVideos()">
            <img src="assets/search.png" width="20">
          </button>
        </form>
        <ul class="navbar-nav mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="#">Sign in</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- -------------- MAIN SECTION -------------- -->
  <div class="container mt-3">
    <select id="video-filter" class="form-select bg-dark text-light" style="width: 300px; margin-left: auto;" onchange="filterVideos()">
      <option value="relevance" selected>Relevance</option>
      <option value="date">Recently uploaded</option>
      <option value="rating">Highly rated</option>
      <option value="viewCount">Highly viewed</option>
    </select>
    <div class="d-flex justify-content-evenly flex-wrap" id="videos-list"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  <script src="index.js"></script>
</body>
</html>

<!--
  # Resources:
    - YouTube Search list API: 
      - Documentation: https://developers.google.com/youtube/v3/docs/search/list
      - API URL: `https://www.googleapis.com/youtube/v3/search?key=${API_KEY}&q=${searchQuery}`
        - Query parameters:
          - key (required): API Key
          - q (required): Search query
    - Setup API Key on Google Cloud Console: https://console.cloud.google.com
      - Create a new project
      - Select the new project
      - Search and visit "YouTube Data API v3" -> Enable it
      - Click on "Credentials" in the side bar
        - Create new credentials -> API Key
        - Select 'Youtube Data API V3' -> Create
        - Copy your API key to use in your application

    - <iframe> HTML tag
      - An inline frame is used to embed another document within the current HTML document
-->
