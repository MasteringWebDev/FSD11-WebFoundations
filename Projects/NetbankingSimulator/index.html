<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>International Bank</title>
  <link rel="icon" href="assets/logo.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
</head>
<body>
  <!-- ------------ NAVBAR ------------ -->
  <nav class="navbar navbar-expand-lg bg-body-tertiary bg-dark border-bottom border-body" data-bs-theme="dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">
        <img src="assets/logo.png" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
        International Bank
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo02" aria-controls="navbarTogglerDemo02" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarTogglerDemo02">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="#">Credit Cards</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Loan</a>
          </li>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Bill Payments</a>
          </li>
        </ul>
        <ul class="navbar-nav mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="#">Welcome, Sonny</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="#">Logout</a>
          </li>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ------------ MAIN ------------ -->
  <div class="container mt-3">
    <div class="row">
      <div class="col-4">
        <div class="list-group" id="list-tab" role="tablist">
          <a class="list-group-item list-group-item-action list-group-item-light active" id="list-home-list" data-bs-toggle="list" href="#list-home" role="tab" aria-controls="list-home">Account Summary</a>
          <a class="list-group-item list-group-item-action list-group-item-light" id="list-profile-list" data-bs-toggle="list" href="#list-profile" role="tab" aria-controls="list-profile">Deposit</a>
          <a class="list-group-item list-group-item-action list-group-item-light" id="list-messages-list" data-bs-toggle="list" href="#list-messages" role="tab" aria-controls="list-messages">Transfer</a>
        </div>
      </div>
      <div class="col-8">
        <div class="tab-content" id="nav-tabContent">
          <!-- ACCOUNT SUMMARY SECTION -->
          <div class="tab-pane fade show active" id="list-home" role="tabpanel" aria-labelledby="list-home-list">
            <div class="card ">
              <div class="card-body">
                <div class="d-flex align-items-center justify-content-between">
                  <h5 class="badge text-bg-success">SAVINGS ACCOUNT</h5>
                  <img src="assets/hide.png" width="25" class="mb-2" id="eye-icon" onclick="showHideDetails()">
                </div>
                <h5 class="card-title" id="account-number">Account Number: 00102020387929</h5>
                <h5 class="card-title">Account Name: Sonny Brown</h5>
                <p class="lead mt-4 mb-0 fs-6">Account balance</p>
                <p class="card-text fs-1 mt-0" id="account-balance">
                  $2782.00
                </p>
              </div>
            </div>
            <div class="accordion mt-3" id="accordionExample">
              <div class="accordion-item">
                <h2 class="accordion-header">
                  <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#collapseOne" aria-expanded="false" aria-controls="collapseOne">
                    Transaction history
                  </button>
                </h2>
                <div id="collapseOne" class="accordion-collapse collapse" data-bs-parent="#accordionExample">
                  <div class="accordion-body">
                    <ul class="list-group mt-3" id="transaction-history">
                    </ul>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- DEPOSIT SECTION -->
          <div class="tab-pane fade" id="list-profile" role="tabpanel" aria-labelledby="list-profile-list">
            <div class="card ">
              <div class="card-body">
                <h5 class="card-title">Deposit</h5>
                <form id="deposit-form">
                  <div class="mb-3">
                    <label class="form-label" for="deposit-type">Deposit type</label>
                    <select class="form-select" id="deposit-type">
                      <option value="Cash">CASH</option>
                      <option value="Cheque">CHEQUE</option>
                    </select>
                  </div>
                  <div class="mb-3">
                    <label class="form-label" for="deposit-amount">Amount</label>
                    <input type="text" class="form-control" id="deposit-amount">
                  </div>
                  <button type="button" class="btn btn-dark" onclick="deposit()">Deposit</button>
                </form>
              </div>
            </div>
            <div class="alert alert-success alert-dismissible fade show mt-2" role="alert" id="deposit-alert">
              Your request was successful
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          </div>

          <!-- TRANSFER SECTION -->
          <div class="tab-pane fade" id="list-messages" role="tabpanel" aria-labelledby="list-messages-list">
            <div class="card ">
              <div class="card-body">
                <h5 class="card-title">Transfer</h5>
                <form id="transfer-form">
                  <div class="mb-3">
                    <label class="form-label" for="beneficiary-account-number">Beneficiary Account Number</label>
                    <input type="text" class="form-control" id="beneficiary-account-number">
                  </div>
                  <div class="mb-3">
                    <label class="form-label" for="beneficiary-name">Beneficiary Name</label>
                    <input type="text" class="form-control" id="beneficiary-name">
                  </div>
                  <div class="mb-3">
                    <label class="form-label" for="transfer-type">Transfer type</label>
                    <select class="form-select" id="transfer-type">
                      <option value="ACH">ACH</option>
                      <option value="WIRE">WIRE</option>
                      <option value="SWIFT">SWIFT</option>
                    </select>
                  </div>
                  <div class="mb-3">
                    <label class="form-label" for="transfer-amount">Amount</label>
                    <input type="text" class="form-control" id="transfer-amount">
                  </div>
                  <div class="mb-3">
                    <label class="form-label" for="purpose">Purpose</label>
                    <input type="text" class="form-control" id="purpose">
                  </div>
                  <button type="button" class="btn btn-dark" onclick="transfer()">Transfer</button>
                </form>
              </div>
            </div>
            <div class="alert alert-success alert-dismissible fade show mt-2" role="alert" id="transfer-alert">
              Your request was successful
              <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js" integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y" crossorigin="anonymous"></script>
  <script src="index.js"></script>
</body>
</html>
