<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modules in JS</title>
</head>
<body>
  <button id="signup-btn">SIGNUP</button>
  <button id="addtocart-btn" >ADD TO CART</button>
  <button id="test-order">TEST ORDER</button>

  <script src="index.js" type="module"></script>
  <script src="user.js" type="module"></script>
  <script src="product.js" type="module"></script>
  <script src="cart.js" type="module"></script>
  <script src="order.js" type="module"></script>
  <script>
    /*
      # Modules in JS:
        - Collection of code related to specific functionality
        - Benefits:
          - Improves readability and maintainability
          - Avoids redundancy (DRY principle)
        - Syntax:
          <script src="user.js" type="module">
        - Import/Export:
          - Export: An internal entity sent outside
          - Import: An external entity brought inside
        - Types of export/import:
          - Default export/import ('default')
            - Can only export a single entity
            - Syntax:
              - Export: export default func1
              - Import: import func1 from './relative-path'
            - Rename entity during import
              - import func100 from './relative-path'
          - Named export/import
            - Can export and import multiple entities
            - Syntax:
              - Export
                - Way 1: export { func1, func2 }
                - Way 2: Export during delcartion
                  export function func1() {}
                  export function func2() {}
              - Import 
                import { func1, func2 } from './relative-path'
            - Rename entity during import ('as' keyword)
              import { func1 as abc, func2 as def} from './relative-path'

        - Additional notes:
          - Relative path:
            - ../: Parent folder
            - ./: Current folder
            - /: Child folder
    */
  </script>
</body>
</html>
