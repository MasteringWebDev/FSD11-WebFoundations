    /*
      # Asynchronous JavaScript
        - Synchronous code: 
          - Executed one line at a time
          - Each expression waits for the previous expression to finish
        - Asynchronous code:
          - Does not block the execution of the synchronous code
          - Handled in the background and executed later

        - JavaScript is a single-threaded language
          - JavaScript has one main thread
          - It executes one operation at a time
          - Still, JavaScrit can handle asynchronous operations with the help of:
            - Web APIs
            - Task Queues
            - Event Loop

        - Timer methods:
          1. setTimeout() ***: Used to execute code after a specified time
            - Syntax:
              setTimeout(() => {
                // code to execute after sometime
              }, timeInMilliseconds)
              - Returns: timerId
            - clearTimeout(timerId): Clear the timeout created by setTimeout
          2. setInterval() ***: Used to execute code repeatedly after specified time intervals
            - Syntax:
              setInterval(() => {
                // code to execute repeatedly after specified time intervals
              }, timeInMilliseconds)
              - Returns: timerId
            - clearInterval(timerId): Clear the interval created by setInterval
    */
