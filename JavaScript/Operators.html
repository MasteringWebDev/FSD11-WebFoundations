    /*
      # Operators: Perform logical operations
        - Arithmetic Operators *
          - Addition (+)
          - Subtraction (-)
          - Multiplication (*)
          - Division (/)
          - Modulus (%) (Remainder)
          - Increment (++)
            - Pre-increment (++x): Increment, then access

          - Greater than or equals to (>=)
          - Lesser than or equals to (<=)
          - Equality operator (==): Equal value
          - Inequality operator (!=): Not equal value
          - Identity operator (===): Equal value + same data type (Strict equality operator)
          - Non-identity operator (!==): Not equal value + same data type
        - Logical Operators *** (Return boolean: true/false)
          - Logical AND (&&): All TRUE -> TRUE, else FALSE
          - Logical OR (||): One TRUE -> TRUE; if none are TRUE, then FALSE
          - Logical NOT (!): TRUE -> FALSE, FALSE -> TRUE
        - typeof Operator: Returns the data type of the value
