  <script>
    /*
      # Events: Any activity performed by the user on the browser

      # Event Handling: Create a logic which executes whenever a specific event has occured
        - 2 ways to handle events:
          - Inline event handlers
          - Event listeners (addEventListener)

      # Inline event handlers:
        - Used as attributes within HTML tags
        - Syntax: <tag eventHandler="[JS LOGIC]"></tag>

        - Examples:
          - onclick: 'click' event ***
          - ondblclick: 'dblclick' event (Double click)
          - onmouseover: 'mouseover' event (Hover) ***
          - onmouseout: 'mouseout' event (Opposite of Hover)
          - onmousemove: 'mousemove' event (Cursor movement)
          - oninput: 'input' event (Track every input change within a text field) ***
          - onchange: 'change' event (Tracks overall change within a text field) ***
          - onkeyup: 'keyup' event (Keyboard key event)
          - onfocus: 'focus' event (Element gets focused) ***
          - onblur: 'blur' event (Element looses focused) ***
          - onload: 'load' event (HTML document load)
    */

    // function test() {
    //   console.log('test')
    // }

    // function confirmRegistration() {
    //   alert('You have successfully registered!')
    // }

    function createProductCard() {
      const parent = document.getElementById('parent')

      const cardDiv = document.createElement('div')
      cardDiv.id = "card"

      const cardImg = document.createElement('img')
      cardImg.src = "https://plus.unsplash.com/premium_photo-1679513691474-73102089c117?w=700&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8aGVhZHBob25lc3xlbnwwfHwwfHx8MA%3D%3D"

      const cardBody = document.createElement('div')
      cardBody.id = 'card-body'

      const productName = document.createElement('h2')
      productName.innerText = "JBL Headphones"

      const productDesc = document.createElement('p')
      productDesc.innerText = "Lorem ipsum dolor sit amet consectetur adipisicing elit. Praesentium, nulla."

      const productPrice = document.createElement('p')
      productPrice.innerHTML = '$120.00 <s>$150.00</s>'

      const addToCardBtn = document.createElement('button')
      addToCardBtn.innerText = 'Add to cart'
      const buyNowBtn = document.createElement('button')
      buyNowBtn.innerText = 'Buy now'

      cardBody.append(productName, productDesc, productPrice, addToCardBtn, buyNowBtn)
      cardDiv.append(cardImg, cardBody)

      parent.append(cardDiv)
    }

    function showAlert() {
      alert('Are you sure this information is right? You will not be able to change it later')
    }
  </script>
