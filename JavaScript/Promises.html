    /*
      # Promises ***: Objects that represents the eventual completion or failure of an asynchronous task
        - Properties:
          - State:
            - Pending
            - Fulfilled (Resolved)
            - Rejected
          - Result: Data that can be passed along with resolving/rejecting a promise
        - Methods:
          - then(): Callback handles the resolved state of the promise
          - catch(): Callback handles the rejected state of the promise

        - Syntax:
          1. Creating a promise
            const promise1 = new Promise((resolve, reject) => {

            })
            - Uses the Promise constructor
            - Promise constructor takes a callback function as an argument with 2 paramters:
              - resolve(): Method to resolve the promise
              - reject(): Mehod to reject the promise (Will throw a runtime error)
            - With resolve/reject methods, result data can be passed as an argument
          2. Handling a promise
            promise1
              .then(() => {
                // Logic to handle resolved state of the promise
              })
              .catch(() => {
                // Logic to handle rejected state of the promise
              })
            - Result data can be accessed as the callback parameter for both .then() and .catch() methods based on resolved or rejected state respectively

    */
