  <script>
    /*
      # IIFE (Immediately Invoked Function Expression):
        - a.k.a Self-invoking functions
        - A function which gets invoked during declaration itself
        - Syntax:
          (function (){
            // code
          })()
        - Use cases:
          - Avoids global scope pollution (Block scope didn't exist before ES6)
          - Hide secret keys/values
    */
