<body>
  <h1>Type Conversion</h1>

  <script>
    /*
      # Type Conversion: Converting a value from one data type to another data type
        - Implicit type conversion (Automatic)
          - a.k.a Type Coercion
          -  Examples:
            - String to Number
              - Equality operator
              - Arithmetic operators other than '+'
            - Number to String
              - '+' Arithmetic operator
            - Any data type to Boolean (Truthy/Falsy values concept)
              - Value is directly placed in condition placeholder

        - Explicit type conversion (Manual)
          - a.k.a Type casting
          - Examples:
            - Inbuilt constructors
              - Number(): Any data type to number
              - String(): Any data type to string
              - Boolean(): Any data type to boolean (Similar to Truthy/Falsy concept)

      # Truthy/Falsy values:
        - Truthy values: Any value that converts to true when evaluated in Boolean context
          - Number: Any non-zero number
          - String: Any non-empty string
        - Falsy values:  Any value that converts to false when evaluated in Boolean context
          - Number: 0, NaN
          - String: ''
          - undefined
          - null

      # NaN: Not a Number
        - Represents an invalid or unrepresentable number
        - typeof NaN = number
        - isNaN(): To check if a value is NaN or not
    */
