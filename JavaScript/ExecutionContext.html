  <script>
    /* 
      # Execution Context:
        - An environment where JS code runs
        - Provided by JavaScript Engine
        - Types of execution contexts:
          - Global Execution Context (GEC)
          - Function Execution Context(s) (FEC)
        - Execution phases
          1. Memory allocation phase
          2. Code execution phase

      # JavaScript Memory
        - Types:
          - Stack Memory: Primitive values (Value are assigned)
          - Heap Memory: Non-primitive values (Reference is assigned)

        - Resources:
          - JS visualizer: https://pythontutor.com/visualize.html#mode=edit
    */

    /* ------------------ */

    // console.log(num1 + num2)

    // var num3 = 30

    // console.log(num1 + num2 + num3)

    /*
      Current phase running: 2. Code execution phase
      JS Memory
      - GEC
        - num1: 10
        - num2: 20
        - num3: 30

    */

    */
