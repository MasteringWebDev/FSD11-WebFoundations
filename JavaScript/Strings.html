    /* 
      # Strings:
        - Can be declared within '', "", ``
        - Special characters:
          - Escape character (\)
          - Next line character (\n)
          - Tab space character (\t)

        - Position vs Index
          - Index = Position - 1
          - Example:
            P   I
            1   0
            2   1
            3   2
            ... ...
            n   n-1

        - Access a specific character in a string using index
          - Syntax: str[index]
        
        - '+' operator works as a concatenation operator with strings
          - Eg.: 'Jesse' + 'W' = 'JesseW'
        
        - Properties:
          - length ***: Total number of characters
        - Methods:
          - toUpperCase(): Returns the string in upper case
          - toLowerCase(): Returns the string in upper case
          - indexOf() ***: Return the index of the first occurence of the substring/character in the string, else returns - 1
            - lastIndexOf(): Return the index of the last occurence of the substring/character in the string, else returns - 1
          - includes() ***: Return true if the substring/character exists in the string, else returns false
          - concat(): Concatenate two or more strings
            - Alternative: '+' operator
          - charAt(index): Returns the character at the specified index
            - Alternative: str[index]
          - slice(startIndex, endIndex) ***: Returns a substring (Ensure startIndex < endIndex)
            - startIndex, endIndex: startIndex to endIndex - 1
            - startIndex: startIndex to the end of the string
            - No arguments: Complete string
            - Alternatives:
              - substr(startIndex, substringLength): Returns a substring starting frm startIndex upto 'substringLength' characters
              - substring(startIndex, endIndex): Almost similar to slice
                - negative index will be treated as 0
                - startIndex > endIndex: index will be swapped
          - replace(substring, replaceValue): Returns a string where first occurence of the substring is replaced with the replaceValue
            - replaceAll(substring, replaceValue): Returns a string where all occurences of the substring is replaced with the replaceValue
        

        - Additional notes:
          - To get last character in a string
            - str[str.length - 1]
        
    */
