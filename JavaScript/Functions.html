    /* 
      # Functions:
        - A set/block of code which is intended to perform a particular task
        - Function can be executed as many number of times as needed
        - Advantages of functions:
          - Avoid repeated code (redundancy)
            - DRY principle (Don't repeat yourself)
          - Modular code (organized code)
    
        - For any function to be executed in JS, it needs two steps
          - Declaration: Only done once
            - Syntax:
              function fun1() {
                // code
              }
          - Invokation (Calling the function): Can be done 'n' number of times
            - Syntax:
              fun1()

        - Type of functions:
          - Standard function
          - Anonymous function
            - Does not have a name
            - Used as a function expression
            - Syntax:
              const fun1 = function () {
                // code
              }
        
        - Parameters and arguments:
          - Can make a function dynamic (For different I/P, you get different O/P)
          - Parameters: Function variables (Values expected) in declaration
          - Arguments: Actual values for function paramaters passed during invokation
          - Syntax:
            function fun1(a, b) { // Parameters
              // code
            }
            func1(10, 20) // Arguments

        - 'return' keyword:
          - Return a value at the point where the function was invoked
          - Terminates the function execution at the point where it is used
    */
