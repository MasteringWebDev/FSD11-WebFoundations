    /*
      # Lexical Environment:
        - "Lexical" means where a specific identifier is declared in the code
          - "Lexical environment": An environment that stores variables + references to it's outer scope
        - Inner scopes can access variables declared in the outer scopes (outer scope in within the lexical environment), but vice-versa is not possible
    */

    /*
      # Scope chain:
        - Used to resolve identifier values. If an identifier is not found in the current scope, JS checks it in the parent scope, if not, continues to check up the ancestor scope until the global scope
