  <script>
    /* 
      # Async Await 
        - Syntactic Sugar/ Alternative for promise handling
        - 'async' keyword: Any function asynchronous
          - Different type of function 'async'
            - async function abc() {}
            - const abc = async function() {}
            - const abc = async () => {}
        - 'await' keyword:
          - Can only be used within an async function
          - Used to pause the execution of async function until the promise is 'resolved'
          - Returns the resolved result of the promise if the promise is resolved
          - Throws the rejected result of the promise if the promise is rejected
        - Syntax:
            async function handlePromise() {
              try {
                const resolvedResult = await promise1
                console.log('Promise 1 was resolved', resolvedResult)
              } catch (rejectedResult) {
                console.log('Promise 1 was rejected', rejectedResult)
              }
            }
            handlePromise()
    */
