  <script>
    /*
      # Error Handling ***:
        - Runtime errors in JS (if not handled) terminates the execution process and the rest of the code is not executed
        - Error Handling is a mechanism to handle these runtime errors and provide meaningful error messages to the user
        - Syntax:
        try {
          // code which is probable to throw an error
        } catch (error) {
          // If error is thrown, handle it here
        }
        - finally {}: Executes in both the scenarios
        - 'throw' keyword: Throw custom errors
          - Custom error: Use Error constructor
            - Syntax: new Error('custom error message') 
          - Syntax: throw new Error('custom error message')
        - Additional note:
          - If no error: START -> try -> END
          - If error: START -> try -> catch -> END
    */
