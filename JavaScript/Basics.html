<!--
  # JavaScript:
    - Programming Language
    - Used in web development to make websites dynamic/interactive
    - Used to build Client (FE), Server (BE), Mobile applications, etc.

    - Add JavaScript to HTML
      - script tag (Head/Body)
        - Internal: <script> </script>
        - External: <script src="index.js"></script>

    - Data Types ***
      - Primitive data type (Value are assigned)
        - String (Eg.: 'Andrea', 'New York', 'A', etc.)
        - Number (Eg.: 5, 3478958, 10.56, -987, etc.)
        - Boolean (true/ false)
        - null (Empty placeholder, set manually)
        - undefined (Default value of variables)
      - Non-primitive data type (Reference is assigned)
        - Objects
          - Arrays
          - Functions

    - Variables & Constants
      - Store data
        - Variables: Change over time (var)
        - Constants: Remain fixed over time (const)
      - Syntax:
        - var name = "Andrea"
        - const name = "Andrea"
      - Declare/Initialize
        - Declare: var x
        - Initialize: var x = 10
      - Assign: x = 20
      - Naming conventions:
        - Cannot start with number
        - Cannot contain spaces (Single word - camelCase)
        - Cannot contain special characters other than _ and $
        - Cannot use reserved keywords

    - Display output
      - console.log() ***: Console
      - alert(): Alert box popup on the webpage
      - document.write(): Append data to the HTML document
      - document.getElementById('id').innerHTML ***: Add HTML snippet inside an element with the specified ID

    - Popups in JavaScript
      - alert(): Alert box
        - Inform the user
        - One button: OK
      - confirm(): Confirmation box
        - Ask the user yes/no based questions
        - Two buttons: OK, Cancel
        - Returns: true if OK is clicked, false if Cancel is clicked
      - prompt(): Input box
        - Collect user input
        - Two button: OK, Cancel, One Input text box
        - Returns: Input value if OK is clicked, null if Cancel is clicked

-->
