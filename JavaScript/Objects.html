    /*
      # Objects: Collection of key value pairs
        - key (string)
        - value (any data type)
        - Syntax:
          let obj1 = {
            key1: value1,
            key2: value2,
            key3: value3,
            ...
          }

        - Access values using keys
          - Syntax 1: obj1.key1
          - Syntax 2: obj1['key1']

        - Add/Update values using keys
          - Syntax 1: obj1.key1 = value1
          - Syntax 2: obj1['key1'] = value1

        - Delete a key
          - 'delete' keyword
          - Syntax: delete obj1.key1

        - Properties and Methods (Keys)
          - Properties: Keys holding any value other than function
          - Method: Keys holding functions as a reference

        - Inbuilt object methods:
          - Object.keys(obj1): Returns an array of keys belonging to an object
          - Object.values(obj1): Returns an array of values belonging to an object
          - Object.entries(obj1): Returns an array of [key, value] pairs belonging to an object

        - JSON: JavaScript Object Notation
          - JSON.stringify(): Convert JS object to JSON string
          - JSON.parse(): Convert a JSON string to JS object

        - Additional note:
          - Arrays are special type of objects, where keys are numerical
          - [object Object]: Object in HTML document flow without converting it to string using JSON.stringify()

      -----------------
      # Constructor: Create objects of similar type
        - Create a new object from constructor: 'new' keyword
        - Inbuilt constructors:
          - Number()
          - String()
          - Boolean()

      # JavaScript is an object-based language
        - Primitive data types were derived from non-primitive object equivalent
        - Wrapper objects for primitive values: JS under the hood, wraps the primitive value with the non-primitive object equivalent
          - Reference: https://2ality.com/2022/02/wrapper-objects.html
    */
