        - Create a logic which executes whenever a specific event has occured
        - Using .addEventListener() method
        - Syntax:
          element.addEventListener('event', (event) => {
            // Logic to be executed when the event is fired
          })
          - Callback parameter: 'event' object
            - .type: Name of the event
            - .target: The element/node where the event occured
          - Examples:
            - onclick: 'click' event ***
            - ondblclick: 'dblclick' event (Double click)
            - onmouseover: 'mouseover' event (Hover) ***
            - onmouseout: 'mouseout' event (Opposite of Hover)
            - onmousemove: 'mousemove' event (Cursor movement)
            - oninput: 'input' event (Track every input change within a text field) ***
            - onchange: 'change' event (Tracks overall change within a text field) ***
            - onkeyup: 'keyup' event (Keyboard key event)
            - onfocus: 'focus' event (Element gets focused) ***
            - onblur: 'blur' event (Element looses focused) ***
            - onload: 'load' event (HTML document load)
    */
