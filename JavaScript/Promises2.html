<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Promise Chaining</title>
</head>
<body>
  <button onclick="placeOrder()">Place order</button>
  <script>
    /*
      - Example: Order tracking app
        - Instantly: Order confirmed ✅
        - After 2 seconds: Order is being prepared 🍜
        - After 10 seconds: Order prepared 🎉
        - After 5 seconds: Order handed over to the delivery person 📦
        - After 3 seconds: Order is on the way 🚴
        - After 8 seconds: Order reached it's destination 📍
        - After 4 seconds: Order has been delivered 😋

        Total order processing time: 2+10+5+3+8+4 = 32 seconds
    */

    const orderBeingPrepared = () => new Promise((resolve, reject) => {
      setTimeout(() => {
        console.log('Order is being prepared 🍜')
        resolve()
      }, 2000)
    })

    const orderPrepared = () => new Promise((resolve, reject) => {
      setTimeout(() => {
        console.log('Order prepared 🎉')
        resolve()
      }, 10000)
    })

    const orderHandedOver = () => new Promise((resolve, reject) => {
      setTimeout(() => {
        console.log('Order handed over to the delivery person 📦')
        resolve()
      }, 5000)
    })

    const orderOnTheWay = () => new Promise((resolve, reject) => {
      setTimeout(() => {
        console.log('Order is on the way 🚴')
        resolve()
      }, 3000)
    })

    const orderReachedDestination = () => new Promise((resolve, reject) => {
      setTimeout(() => {
        console.log(`Order reached it's destination 📍`)
        resolve()
      }, 8000)
    })

    const orderDelivered = () => new Promise((resolve, reject) => {
      setTimeout(() => {
        console.log('Order has been delivered 😋')
        resolve()
      }, 4000)
    })

    const placeOrder = () => {
      console.log('Order confirmed ✅')

      orderBeingPrepared()
        .then(() => orderPrepared())
        .then(() => orderHandedOver())
        .then(() => orderOnTheWay())
        .then(() => orderReachedDestination())
        .then(() => orderDelivered())
        .then(() => console.log('Enjoy your meal!'))
        .catch(() => console.log('Something went wrong'))
    }
  </script>
</body>
</html>
