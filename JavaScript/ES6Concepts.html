    /*
      # ES6 Concepts:
        - ES: ECMAScript
        - ES6: JavaScript 6th Version (2015)
        - Several 'Syntactic sugar' (minimalist syntaxes) were introduced in this Version
        - ES6 is used extensively in JS libraries like React.js, Vue.js, Angular.js, etc.

        - Concepts/Syntaxes:
          1. let and const (Block scope) ***
            - let: Declare variables
            - const: Declare constants

          2. Template literals/strings (``)
            - It starts and ends with backticks (`)
            - Supports multi-line strings and expressions
            - Syntax to use variables/expressions within template strings
              - `${variable}`

          3. Default parameters
            - Default values can be provided to function parameters
            - Default values are applied if arguments are not passed for those parameters
            - Syntax:
              function abc(a = 0, b = 0) {}

          4. Arrow functions (() => {}) ***
            - Syntactic sugar for anonymous functions
            - Syntax:
              const abc = () => {
                console.log('abc')
              }
            - Single line arrow function:
              - Scenarios:
                - Function which has just a single expression (Skip {})
                - Function which has single expression + return value (Skip {} and return)
              - Syntax: 
                - Scenario 1
                  const abc = () => {
                    console.log('abc')
                  }
                  const abc = () => console.log('abc')
                - Scenario 2
                  const abc = () => {
                    return 5
                  }
                  const abc = () => 5
            - Additional note: Skip () if only 1 paramater exist
          
          5. Object property shorthand ({ p1, p2 })
            - Whenever the object property name and the name of the variable assigned to it are the same, { key: value } can be just declared as { key }

          6. Destructuring ({ p1 } = obj)
            - Create variables having the same name as the property and have the variable value = value of the property
            - Syntax:
              const { a, b } = obj
              - Different variable name for any property
                const { a: variable1, b: variable2 } = obj

          7. Spread Operator (...) ***
            - Used to select all elements within arrays or objects
            - Used with arrays and objects
            - Syntax:
              - Can be used to create shallow copy:
                [...arr] (Arrays)
                {...obj} (Objects)


    */
